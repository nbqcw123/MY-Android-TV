name: Build Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Configure mirrors
        run: |
          mkdir -p $ANDROID_HOME/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-license

          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle << 'EOF'
          allprojects {
            buildscript { repositories { maven { url 'https://maven.aliyun.com/repository/google' }; maven { url 'https://maven.aliyun.com/repository/central' }; maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }; maven { url 'https://maven.aliyun.com/repository/public' }; google(); mavenCentral() } }
            repositories { maven { url 'https://maven.aliyun.com/repository/google' }; maven { url 'https://maven.aliyun.com/repository/central' }; maven { url 'https://maven.aliyun.com/repository/public' }; google(); mavenCentral() } }
          }
          settingsEvaluated { settings ->
            settings.pluginManagement { repositories { maven { url 'https://maven.aliyun.com/repository/google' }; maven { url 'https://maven.aliyun.com/repository/central' }; maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }; maven { url 'https://maven.aliyun.com/repository/public' }; google(); mavenCentral() } } }
          EOF

      - name: Build
        timeout-minutes: 45
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tee build.log
          echo "BUILD_OK=$?" >> $GITHUB_ENV

      - name: Find and copy APKs
        shell: bash
        run: |
          set +e
          echo "Build exit code: $BUILD_OK"
          mkdir -p artifacts
          find app/build -name "*.apk" -type f 2>/dev/null
          find app/build -name "*.apk" -type f -exec cp {} artifacts/ \; 2>/dev/null
          echo "=== Artifacts ==="
          ls -la artifacts/
          echo "APK_COUNT=$(ls artifacts/*.apk 2>/dev/null | wc -l)" >> $GITHUB_ENV

      - name: Create Release
        if: env.BUILD_OK == '0' && env.APK_COUNT != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: artifacts/*.apk
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}
