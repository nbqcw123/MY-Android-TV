name: Build Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx4096m"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Gradle mirror
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle << 'EOF'
          allprojects {
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/google' }
                  maven { url 'https://maven.aliyun.com/repository/central' }
                  maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
                  maven { url 'https://maven.aliyun.com/repository/public' }
              }
          }
          settingsEvaluated { settings ->
              settings.pluginManagement {
                  repositories {
                      maven { url 'https://maven.aliyun.com/repository/google' }
                      maven { url 'https://maven.aliyun.com/repository/central' }
                      maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
                      maven { url 'https://maven.aliyun.com/repository/public' }
                  }
              }
          }
          EOF

      - name: Build APK
        timeout-minutes: 30
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
          echo "=== Build complete, checking APK ==="
          find app/build -name "*.apk" 2>/dev/null || echo "No APKs found in app/build"
          ls -laR app/build/outputs/ 2>/dev/null || echo "No outputs dir"

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >>$GITHUB_OUTPUT

      - name: Rename APKs
        run: |
          mkdir -p artifacts
          echo "=== Looking for APKs ==="
          find app/build -type f -name "*.apk" -print0 | while IFS= read -r -d '' file; do
            echo "Found: $file"
            basename=$(basename "$file" .apk)
            cp "$file" "artifacts/MY-Android-TV-${{ steps.version.outputs.version }}-${basename}.apk"
          done
          echo "=== Artifacts ==="
          ls -la artifacts/ || echo "No artifacts dir"
          if [ "$(ls -A artifacts/ 2>/dev/null)" ]; then
            echo "✅ APKs ready for upload"
          else
            echo "❌ No APKs found in app/build"
            find app/build -type f -name "*.apk" 2>/dev/null
            exit 1
          fi

      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          name: v${{ steps.version.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
          allowUpdates: true
          artifacts: artifacts/*
