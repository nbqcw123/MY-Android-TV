name: Build Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx4096m"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Gradle mirror
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle << 'EOF'
          allprojects {
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/google' }
                  maven { url 'https://maven.aliyun.com/repository/central' }
                  maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
                  maven { url 'https://maven.aliyun.com/repository/public' }
              }
          }
          settingsEvaluated { settings ->
              settings.pluginManagement {
                  repositories {
                      maven { url 'https://maven.aliyun.com/repository/google' }
                      maven { url 'https://maven.aliyun.com/repository/central' }
                      maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
                      maven { url 'https://maven.aliyun.com/repository/public' }
                  }
              }
          }
          EOF

      - name: Build APK
        timeout-minutes: 30
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --continue || true

      - name: Check APK output
        run: |
          echo "=== Checking APK output ==="
          find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APKs found"
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APKs"

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >>$GITHUB_OUTPUT

      - name: Rename APKs
        if: hashFiles('app/build/outputs/apk/debug/*.apk') != ''
        run: |
          mkdir -p artifacts
          for file in app/build/outputs/apk/debug/*.apk; do
            if [ -f "$file" ]; then
              basename=$(basename "$file" .apk)
              mv "$file" "artifacts/MY-Android-TV-${{ steps.version.outputs.version }}-${basename}.apk"
            fi
          done
          ls -la artifacts/

      - name: Upload Release
        if: hashFiles('artifacts/*.apk') != ''
        uses: ncipollo/release-action@v1
        with:
          name: v${{ steps.version.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
          allowUpdates: true
          artifacts: artifacts/*
