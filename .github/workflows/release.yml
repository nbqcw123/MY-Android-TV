name: Build Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: |
          mkdir -p $ANDROID_HOME/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $ANDROID_HOME/licenses/android-sdk-license

      - name: Setup Gradle mirrors
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle << 'EOF'
          allprojects {
            buildscript { repositories {
              maven { url 'https://maven.aliyun.com/repository/google' }
              maven { url 'https://maven.aliyun.com/repository/central' }
              maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
              maven { url 'https://maven.aliyun.com/repository/public' }
              google(); mavenCentral()
            } }
            repositories {
              maven { url 'https://maven.aliyun.com/repository/google' }
              maven { url 'https://maven.aliyun.com/repository/central' }
              maven { url 'https://maven.aliyun.com/repository/public' }
              google(); mavenCentral()
            } }
          }
          settingsEvaluated { settings ->
            settings.pluginManagement { repositories {
              maven { url 'https://maven.aliyun.com/repository/google' }
              maven { url 'https://maven.aliyun.com/repository/central' }
              maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
              maven { url 'https://maven.aliyun.com/repository/public' }
              google(); mavenCentral()
            } } }
          EOF

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Build
        timeout-minutes: 55
        run: |
          chmod +x gradlew
          echo "=== Build attempt 1 ==="
          ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/build.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "EXIT_CODE=$EXIT_CODE" >> $GITHUB_ENV
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "Build attempt 1 failed, retry in 30s..."
            sleep 30
            echo "=== Build attempt 2 ==="
            ./gradlew assembleDebug --no-daemon 2>&1 | tee -a /tmp/build.log
            EXIT_CODE=${PIPESTATUS[0]}
            echo "EXIT_CODE=$EXIT_CODE" >> $GITHUB_ENV
          fi
          exit $EXIT_CODE

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log

      - name: Prepare APK
        if: env.EXIT_CODE == '0'
        run: |
          mkdir -p output
          find app/build -name "*.apk" -type f -exec cp {} output/ \;
          echo "=== APKs ==="
          ls -la output/

      - name: Upload APK
        if: env.EXIT_CODE == '0'
        uses: actions/upload-artifact@v4
        with:
          name: apk-files
          path: output/*.apk
